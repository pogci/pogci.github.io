<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Coloc Vibes ✨</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🌿 Coloc Vibes</h1>
  <p>Elodie & Cécilia</p>
  <p id="currentUser"></p>
</header>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<main id="app" style="display:none;">

<nav>
  <button onclick="showPage('courses')">Courses</button>
  <button onclick="showPage('agenda')">Agenda</button>
  <button onclick="showPage('plantes')">Plantes</button>
  <button onclick="showPage('notes')">Notes</button>
  <button onclick="showPage('sport')">Sport</button>
</nav>

<!-- COURSES -->
<section id="courses" class="page">
  <h2>🛒 Courses</h2>
  <input id="courseInput">
  <button onclick="addCourse()">Ajouter</button>
  <ul id="courseList"></ul>
</section>

<!-- AGENDA -->
<section id="agenda" class="page hidden">
  <h2>📅 Agenda</h2>

  <button onclick="prevMonth()">⬅</button>
  <span id="monthLabel"></span>
  <button onclick="nextMonth()">➡</button>

  <div id="calendar"></div>
</section>

<!-- PLANTES -->
<section id="plantes" class="page hidden">
  <h2>🌱 Plantes</h2>
  <ul id="plantList"></ul>
</section>

<!-- NOTES -->
<section id="notes" class="page hidden">
  <h2>💌 Notes & Recos</h2>
  <textarea id="noteInput"></textarea>
  <button onclick="addNote()">Ajouter</button>
  <ul id="noteList"></ul>

  <iframe style="border-radius:12px"
  src="https://open.spotify.com/embed/playlist/3gUptoFUZW0YxoBciSe41R"
  width="100%" height="152"></iframe>
</section>

<!-- SPORT -->
<section id="sport" class="page hidden">
  <h2>🧘‍♀️ Sport</h2>
  <input id="sportInput">
  <button onclick="addSport()">Ajouter</button>
  <ul id="sportList"></ul>
</section>

</main>

</body>
</html>
