<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Coloc Vibes ✨ Aurora Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600&family=Audiowide&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body data-theme="light">

<canvas id="auroraCanvas"></canvas>

<header>
  <h1 class="logo">🌿 Coloc Vibes</h1>
  <p id="currentUser"></p>
  <div id="themeToggle" class="toggle">
    <span>☀️</span>
    <label class="switch">
      <input type="checkbox" id="themeCheckbox">
      <span class="slider"></span>
    </label>
    <span>🌙</span>
  </div>
</header>

<div id="loginPage" class="card login-card">
  <h2>🔐 Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<main id="app" style="display:none;">

<nav id="navbar">
  <button onclick="showPage('dashboard')">🏠</button>
  <button onclick="showPage('courses')">🛒</button>
  <button onclick="showPage('agenda')">📆</button>
  <button onclick="showPage('plantes')">🌱</button>
  <button onclick="showPage('notes')">💌</button>
  <button onclick="showPage('sport')">🧘‍♀️</button>
  <button onclick="showPage('activites')">🎲</button>
  <button onclick="showPage('galerie')">📸</button>
  <button onclick="showPage('absence')">🏖️</button>
</nav>

<section id="dashboard" class="page active-page">
  <h2>🏠 Tableau de bord</h2>
  <div class="dash-grid">
    <div class="card floating">
      <h3 id="greeting">Bonjour ✨</h3>
    </div>
    <div class="card floating">
      <h3>🎲 Activité du jour</h3>
      <p id="dailyActivity"></p>
    </div>
    <div class="card floating summary">
      <h3>📋 Résumé</h3>
      <ul>
        <li>Courses : <span id="summaryCourses">0</span></li>
        <li>Notes : <span id="summaryNotes">0</span></li>
      </ul>
    </div>
  </div>
</section>

<section id="courses" class="page" style="display:none;">
  <input id="courseInput">
  <button onclick="addCourse()">Ajouter</button>
  <ul id="courseList"></ul>
</section>

<section id="agenda" class="page" style="display:none;">
  <button onclick="prevMonth()">⬅</button>
  <span id="monthLabel"></span>
  <button onclick="nextMonth()">➡</button>
  <div id="calendar"></div>
</section>

<section id="plantes" class="page" style="display:none;">
  <ul id="plantList"></ul>
</section>

<section id="notes" class="page" style="display:none;">
  <textarea id="noteInput"></textarea>
  <button onclick="addNote()">Ajouter</button>
  <ul id="noteList"></ul>
</section>

<section id="sport" class="page" style="display:none;">
  <input id="sportInput">
  <button onclick="addSport()">Ajouter</button>
  <ul id="sportList"></ul>
</section>

<section id="activites" class="page" style="display:none;">
  <button id="suggestButton">Inspire-moi</button>
  <div id="suggestionBox"></div>
</section>

<section id="galerie" class="page" style="display:none;">
  <input type="file" id="photoUpload">
  <p id="uploadStatus"></p>
  <div id="galleryGrid"></div>
</section>

<section id="absence" class="page" style="display:none;">
  <input type="checkbox" id="absentToggle">
  <div id="presenceStatus"></div>
</section>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"XXX",
  authDomain:"XXX",
  projectId:"XXX",
  storageBucket:"XXX",
  messagingSenderId:"XXX",
  appId:"XXX"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();
</script>

<!-- ✅ IMPORTANT -->
<script src="script.js" defer></script>

</body>
</html>
